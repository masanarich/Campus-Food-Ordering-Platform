name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Check required root files exist
        run: |
          test -f package.json
          test -f public/index.html
          test -f public/index.css
          test -f public/index.js

      - name: Check all HTML files have DOCTYPE
        run: |
          find public -name "*.html" | while read file; do
            echo "Checking $file"
            grep -q "<!DOCTYPE html>" "$file"
          done

      - name: Fail on non-semantic div or span tags in public HTML
        run: |
          if grep -RInE --include="*.html" "<[[:space:]]*/?[[:space:]]*(div|span)\b" public; then
            echo ""
            echo "Non-semantic <div> or <span> tags were found in public HTML files."
            echo "Replace them with semantic elements before merging."
            exit 1
          fi
          echo "No <div> or <span> tags found in public HTML files."

      - name: Check all CSS files are not empty
        run: |
          find public -name "*.css" | while read file; do
            echo "Checking $file"
            test -s "$file"
          done

      - name: Check all JS files are not empty
        run: |
          find public -name "*.js" | while read file; do
            echo "Checking $file"
            test -s "$file"
          done

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
