<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Your Order — Campus Food</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <h1 class="site-title">Campus Food Ordering Platform</h1>

  <nav class="navbar">
    <a href="../index.html">Home</a>
    <a href="../vendor-application.html">Vendors</a>
    <a href="index.html" class="active">Track Order</a>
  </nav>

  <main class="card">
    <h2>Track Your Order</h2>
    <p class="subtitle">Enter your order ID to see your real-time status.</p>

    <section class="search-section">
      <label for="order-id-input">Order ID</label>
      <input type="text" id="order-id-input" placeholder="e.g. 4821" />
      <button id="btn-track" class="btn btn-primary">Track Order</button>
    </section>

    <section id="tracking-section" class="tracking-section hidden">

      <header class="order-header">
        <section class="order-meta">
          <h3 id="order-title">Order #</h3>
          <p id="order-sub" class="subtitle"></p>
        </section>
        <span id="status-tag" class="tag"></span>
      </header>

      <section class="steps" id="steps">
        <article class="step" id="s0">
          <span class="dot" id="d0"></span>
          <label class="step-label">Order Received</label>
        </article>
        <article class="step" id="s1">
          <span class="dot" id="d1"></span>
          <label class="step-label">Preparing</label>
        </article>
        <article class="step" id="s2">
          <span class="dot" id="d2"></span>
          <label class="step-label">Ready for Pickup</label>
        </article>
      </section>

      <aside id="ready-banner" class="banner hidden">
        Your order is ready! Please collect it from the vendor counter.
      </aside>

      <section class="items-section">
        <h4>Your items</h4>
        <ul id="items-list"></ul>
      </section>

    </section>

    <p id="not-found" class="not-found hidden">No order found with that ID. Please check and try again.</p>

  </main>

  <script type="module" src="index.js"></script>
</body>
</html>
