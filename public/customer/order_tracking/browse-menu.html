<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse Menu - CampusBite</title>

</head>
<body>

<aside id="authOverlay">Checking session...</aside>
  <link rel="stylesheet" href="./browse-menu.css">
<nav>
  <strong class="nav-logo">Campus<span>Bite</span></strong>
  <section class="nav-right">
    <a href="track-order.html">Track Order</a>
    <a href="cart.html" class="cart-btn">
      Cart <span class="cart-count" id="cartCount">0</span>
    </a>
  </section>
</nav>

<main class="container">
  <header style="margin-bottom:28px;">
    <h1 style="font-size:1.6rem;font-weight:800;">
      Browse <span style="color:#f5a623;">Menu</span>
    </h1>
    <p style="color:#7e8494;margin-top:6px;">
      Fresh food from campus vendors
    </p>
  </header>

  <search class="search-bar">
    <input
      type="search"
      class="search-input"
      id="searchInput"
      placeholder="Search for food..."
      aria-label="Search menu items"
    />
    <button class="filter-btn active" id="filterAll">All</button>
    <button class="filter-btn" id="filterMeals">Meals</button>
    <button class="filter-btn" id="filterSnacks">Snacks</button>
    <button class="filter-btn" id="filterDrinks">Drinks</button>
    <button class="filter-btn" id="filterDesserts">Desserts</button>
  </search>

  <h2 class="section-title">Available Items</h2>
  <section class="menu-grid" id="menuGrid" aria-live="polite">
    <article class="empty-state">
      <p aria-hidden="true">Loading menu...</p>
    </article>
  </section>
</main>

<output class="toast" id="toast" aria-live="assertive">Added to cart!</output>

<script type="module" src="browse-menu.js"></script>

</body>
</html>
