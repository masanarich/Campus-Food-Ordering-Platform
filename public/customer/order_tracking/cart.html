<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart – CampusBite</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0e0f11;
      color: #f0ede8;
      min-height: 100vh;
    }

    nav {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 32px; height: 60px;
      background: #16181c;
      border-bottom: 1px solid #2a2d35;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-size: 1.2rem; font-weight: 800; }
    .nav-logo span { color: #f5a623; }
    .nav-right a {
      color: #7e8494; text-decoration: none;
      font-size: 0.9rem; padding: 8px 14px;
      border-radius: 8px; transition: all 0.2s;
    }
    .nav-right a:hover { color: #f0ede8; background: #1e2128; }

    .container { max-width: 700px; margin: 0 auto; padding: 40px 24px; }

    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
    h1 span { color: #f5a623; }

    /* STUDENT NAME INPUT */
    .name-card {
      background: #1e2128;
      border: 1px solid #2a2d35;
      border-radius: 14px;
      padding: 24px; margin-bottom: 24px;
    }
    .name-card label {
      display: block; font-size: 0.82rem;
      font-weight: 600; color: #7e8494;
      text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 10px;
    }
    .name-card input {
      width: 100%; padding: 12px 16px;
      background: #0e0f11;
      border: 1px solid #2a2d35;
      border-radius: 10px; color: #f0ede8;
      font-size: 0.95rem; outline: none;
      transition: border 0.2s;
    }
    .name-card input:focus { border-color: #f5a623; }

    /* CART ITEMS */
    .cart-card {
      background: #1e2128;
      border: 1px solid #2a2d35;
      border-radius: 14px;
      padding: 24px; margin-bottom: 24px;
    }
    .cart-card h2 {
      font-size: 1rem; font-weight: 700;
      margin-bottom: 20px; color: #f5a623;
    }

    .cart-item {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #2a2d35;
    }
    .cart-item:last-child { border-bottom: none; }

    .item-info { flex: 1; }
    .item-info .name { font-weight: 600; font-size: 0.95rem; }
    .item-info .unit-price {
      color: #7e8494; font-size: 0.82rem; margin-top: 3px;
    }

    .qty-controls {
      display: flex; align-items: center; gap: 10px;
    }
    .qty-btn {
      width: 30px; height: 30px;
      background: #0e0f11;
      border: 1px solid #2a2d35;
      border-radius: 8px; color: #f0ede8;
      font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .qty-btn:hover { border-color: #f5a623; color: #f5a623; }
    .qty-num { font-weight: 700; min-width: 20px; text-align: center; }

    .item-total {
      color: #f5a623; font-weight: 800;
      font-size: 0.95rem; min-width: 60px;
      text-align: right;
    }
    .btn-remove {
      background: transparent; border: none;
      color: #7e8494; cursor: pointer;
      font-size: 1rem; margin-left: 12px;
      transition: color 0.2s;
    }
    .btn-remove:hover { color: #e8563a; }

    /* ORDER SUMMARY */
    .summary-card {
      background: #1e2128;
      border: 1px solid #2a2d35;
      border-radius: 14px;
      padding: 24px; margin-bottom: 24px;
    }
    .summary-card h2 {
      font-size: 1rem; font-weight: 700;
      margin-bottom: 16px;
    }
    .summary-row {
      display: flex; justify-content: space-between;
      font-size: 0.9rem; padding: 8px 0;
      border-bottom: 1px solid #2a2d35;
      color: #7e8494;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-total {
      display: flex; justify-content: space-between;
      font-size: 1.1rem; font-weight: 800;
      padding-top: 16px; margin-top: 8px;
      border-top: 1px solid #2a2d35;
    }
    .summary-total span:last-child { color: #f5a623; }

    /* PLACE ORDER BTN */
    .btn-place-order {
      width: 100%; padding: 16px;
      background: #f5a623; color: #000;
      border: none; border-radius: 12px;
      font-size: 1.05rem; font-weight: 800;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-place-order:hover {
      opacity: 0.85;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245,166,35,0.3);
    }
    .btn-place-order:disabled {
      opacity: 0.4; cursor: not-allowed;
      transform: none; box-shadow: none;
    }

    /* MESSAGES */
    .msg {
      padding: 14px 16px; border-radius: 10px;
      font-size: 0.9rem; margin-bottom: 20px;
      display: none;
    }
    .msg-success {
      background: rgba(62,207,142,0.15);
      border: 1px solid rgba(62,207,142,0.4);
      color: #3ecf8e;
    }
    .msg-error {
      background: rgba(232,86,58,0.15);
      border: 1px solid rgba(232,86,58,0.4);
      color: #e8563a;
    }

    .empty-cart {
      text-align: center; padding: 60px 20px;
      color: #7e8494;
    }
    .empty-cart div { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-cart a {
      color: #f5a623; text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">Campus<span>Bite</span></div>
  <div class="nav-right">
    <a href="browse-menu.html">← Back to Menu</a>
  </div>
</nav>

<div class="container">
  <h1>Your <span>Cart</span></h1>
  <p style="color:#7e8494;margin-bottom:28px;margin-top:6px;">
    Review your order before placing it
  </p>

  <div class="msg msg-success" id="successMsg"></div>
  <div class="msg msg-error" id="errorMsg"></div>

  <!-- STUDENT NAME -->
  <div class="name-card">
    <label>Your Name</label>
    <input
      type="text"
      id="studentName"
      placeholder="Enter your name for the order"
    />
  </div>

  <!-- CART ITEMS -->
  <div class="cart-card">
    <h2>🛒 Order Items</h2>
    <div id="cartItemsList"></div>
  </div>

  <!-- ORDER SUMMARY -->
  <div class="summary-card" id="summaryCard">
    <h2>Order Summary</h2>
    <div id="summaryRows"></div>
    <div class="summary-total">
      <span>Total</span>
      <span id="totalAmount">R0.00</span>
    </div>
  </div>

  <button
    class="btn-place-order"
    id="placeOrderBtn"
    onclick="placeOrder()">
    Place Order 🚀
  </button>
</div>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // RENDER CART
  function renderCart() {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const list = document.getElementById('cartItemsList');
    const summaryRows = document.getElementById('summaryRows');
    const totalEl = document.getElementById('totalAmount');
    const btn = document.getElementById('placeOrderBtn');

    if (cart.length === 0) {
      list.innerHTML = `
        <div class="empty-cart">
          <div>🛒</div>
          <p>Your cart is empty.</p>
          <a href="browse-menu.html">Browse Menu →</a>
        </div>`;
      document.getElementById('summaryCard').style.display = 'none';
      btn.disabled = true;
      return;
    }

    document.getElementById('summaryCard').style.display = 'block';
    btn.disabled = false;

    let total = 0;

    list.innerHTML = cart.map((item, index) => {
      const itemTotal = item.price * item.qty;
      total += itemTotal;
      return `
        <div class="cart-item">
          <div class="item-info">
            <div class="name">${item.name}</div>
            <div class="unit-price">R${item.price.toFixed(2)} each</div>
          </div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty(${index}, -1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
          </div>
          <div class="item-total">R${itemTotal.toFixed(2)}</div>
          <button class="btn-remove" onclick="removeItem(${index})">🗑</button>
        </div>`;
    }).join('');

    summaryRows.innerHTML = cart.map(item => `
      <div class="summary-row">
        <span>${item.name} x${item.qty}</span>
        <span>R${(item.price * item.qty).toFixed(2)}</span>
      </div>`).join('');

    totalEl.textContent = `R${total.toFixed(2)}`;
  }

  // CHANGE QUANTITY
  window.changeQty = function (index, delta) {
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    cart[index].qty += delta;
    if (cart[index].qty <= 0) cart.splice(index, 1);
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
  }

  // REMOVE ITEM
  window.removeItem = function (index) {
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    cart.splice(index, 1);
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
  }

  // PLACE ORDER
  window.placeOrder = async function () {
    const studentName = document.getElementById('studentName').value.trim();
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');
    const btn = document.getElementById('placeOrderBtn');

    successMsg.style.display = 'none';
    errorMsg.style.display = 'none';

    if (!studentName) {
      errorMsg.textContent = '❌ Please enter your name before placing the order.';
      errorMsg.style.display = 'block';
      return;
    }

    if (cart.length === 0) {
      errorMsg.textContent = '❌ Your cart is empty.';
      errorMsg.style.display = 'block';
      return;
    }

    const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
    const vendorId = cart[0].vendorId;

    btn.disabled = true;
    btn.textContent = 'Placing Order...';

    try {
      const orderRef = await addDoc(collection(db, 'orders'), {
        studentName,
        vendorId,
        items: cart.map(i => ({
          name: i.name,
          price: i.price,
          qty: i.qty
        })),
        total,
        status: 'received',
        createdAt: serverTimestamp()
      });

      // Clear cart
      localStorage.removeItem('cart');

      // Save order ID for tracking
      localStorage.setItem('lastOrderId', orderRef.id);

      successMsg.textContent = '✅ Order placed! Redirecting to tracking...';
      successMsg.style.display = 'block';

      setTimeout(() => {
        window.location.href = 'track-order.html';
      }, 2000);

    } catch (err) {
      errorMsg.textContent = '❌ Error placing order: ' + err.message;
      errorMsg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Place Order 🚀';
    }
  }

  renderCart();
</script>

</body>
</html>
