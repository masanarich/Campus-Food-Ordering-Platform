<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Food Order Tracking</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Campus Food Order Tracking</h1>
      <p class="subtitle">
        Student side: place your order and watch progress in real time.
      </p>

      <section class="card">
        <h2>Place Order</h2>
        <form id="create-order-form" class="grid">
          <label>
            Student Name
            <input id="studentName" required placeholder="e.g. Lerato" />
          </label>
          <label>
            Food Item
            <input id="itemName" required placeholder="e.g. Chicken Wrap" />
          </label>
          <label>
            Vendor
            <input id="vendorName" required placeholder="e.g. Campus Cafe" />
          </label>
          <button type="submit">Place Order</button>
        </form>
        <p id="create-order-feedback" class="feedback"></p>
      </section>

      <section class="card">
        <h2>Track Orders</h2>
        <p class="hint">
          Live status flow: <strong>Order Received</strong> ->
          <strong>Preparing</strong> -> <strong>Ready for Pickup</strong>
        </p>
        <div id="order-list" class="list"></div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
  </html>
