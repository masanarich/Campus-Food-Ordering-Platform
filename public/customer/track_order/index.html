<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track Your Order - Campus Food</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="track-header">
      <div class="header-content">
        <h1 class="header-title">Order Tracker</h1>
        <p class="header-subtitle">Real-time food order tracking for campus</p>
      </div>
    </header>

    <main class="container">
      <!-- Order Form Section -->
      <section class="form-card">
        <h2>Place Your Order</h2>
        <p class="section-description">Enter your details and choose your favorite meal</p>
        <form id="create-order-form" class="order-form">
          <div class="form-group">
            <label for="studentName" class="form-label">
              Your Name
              <span class="required">*</span>
            </label>
            <input 
              id="studentName" 
              type="text"
              required 
              placeholder="e.g. Lerato Dlamini" 
              class="form-input"
            />
          </div>
          
          <div class="form-group">
            <label for="itemName" class="form-label">
              Food Item
              <span class="required">*</span>
            </label>
            <input 
              id="itemName" 
              type="text"
              required 
              placeholder="e.g. Spicy Chicken Wrap" 
              class="form-input"
            />
          </div>
          
          <div class="form-group">
            <label for="vendorName" class="form-label">
              Vendor
              <span class="required">*</span>
            </label>
            <input 
              id="vendorName" 
              type="text"
              required 
              placeholder="e.g. Campus Cafe" 
              class="form-input"
            />
          </div>

          <button type="submit" class="submit-btn">Place Order</button>
          <p id="create-order-feedback" class="form-feedback"></p>
        </form>
      </section>

      <!-- Track Orders Section -->
      <section class="track-section">
        <div class="section-header">
          <div>
            <h2>Your Orders</h2>
            <p class="section-description">Click on any order to see detailed progress</p>
          </div>
        </div>

        <div id="order-list" class="order-list"></div>
        <div id="empty-state" class="empty-state" style="display: none;">
          <p>No orders yet. Place your first order to get started!</p>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
</html>
