<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Progress - Campus Food Ordering</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="detail-header">
        <a href="index.html" class="back-button">← Back to Orders</a>
        <h1>Order Progress</h1>
      </div>

      <section class="card order-detail">
        <div class="order-info">
          <h2 id="order-number">Order #1000</h2>
          <p id="order-summary"></p>
        </div>

        <div class="progress-container">
          <div class="progress-stages">
            <div class="stage" data-stage="0">
              <div class="stage-dot">
                <span class="stage-icon">📦</span>
              </div>
              <div class="stage-label">Order Received</div>
              <div class="stage-time" id="time-0"></div>
            </div>

            <div class="stage-connector"></div>

            <div class="stage" data-stage="1">
              <div class="stage-dot">
                <span class="stage-icon">👨‍🍳</span>
              </div>
              <div class="stage-label">Preparing</div>
              <div class="stage-time" id="time-1"></div>
            </div>

            <div class="stage-connector"></div>

            <div class="stage" data-stage="2">
              <div class="stage-dot">
                <span class="stage-icon">✅</span>
              </div>
              <div class="stage-label">Ready for Pickup</div>
              <div class="stage-time" id="time-2"></div>
            </div>
          </div>
        </div>

        <div id="ready-message" class="ready-message" style="display: none;">
          <p>🎉 Your order is ready for pickup! Please collect it from the vendor.</p>
        </div>
      </section>

      <section class="card">
        <h3>Timeline</h3>
        <ol class="timeline" id="timeline"></ol>
      </section>

      <section class="card">
        <h3>Estimated Time</h3>
        <div id="estimated-time" class="estimated-time">
          <p id="time-estimate">Calculating...</p>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="order-detail.js"></script>
  </body>
</html>
