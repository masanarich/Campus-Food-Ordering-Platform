<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Progress - Campus Food</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="track-header">
      <div class="header-content">
        <a href="index.html" class="back-link">← Back to Orders</a>
        <h1 class="header-title">Order Progress</h1>
      </div>
    </header>

    <main class="container">
      <!-- Order Summary Card -->
      <section class="summary-card">
        <div class="summary-header">
          <h2 id="order-number" class="order-number">Order #1000</h2>
          <p id="order-summary" class="order-summary-text"></p>
        </div>
        <div class="summary-details">
          <div class="detail-item">
            <span class="detail-label">Status</span>
            <span id="current-status" class="detail-value status-badge">Loading...</span>
          </div>
        </div>
      </section>

      <!-- Progress Tracker Card -->
      <section class="progress-card">
        <h2 class="card-title">Your Order Journey</h2>
        <div class="progress-container">
          <div class="progress-stages">
            <div class="stage" data-stage="0">
              <div class="stage-dot">
                <span class="stage-number">1</span>
              </div>
              <div class="stage-content">
                <div class="stage-label">Order Received</div>
                <div class="stage-time" id="time-0"></div>
              </div>
            </div>

            <div class="stage-line"></div>

            <div class="stage" data-stage="1">
              <div class="stage-dot">
                <span class="stage-number">2</span>
              </div>
              <div class="stage-content">
                <div class="stage-label">Preparing</div>
                <div class="stage-time" id="time-1"></div>
              </div>
            </div>

            <div class="stage-line"></div>

            <div class="stage" data-stage="2">
              <div class="stage-dot">
                <span class="stage-number">3</span>
              </div>
              <div class="stage-content">
                <div class="stage-label">Ready for Pickup</div>
                <div class="stage-time" id="time-2"></div>
              </div>
            </div>
          </div>
        </div>

        <div id="ready-message" class="ready-banner" style="display: none;">
          <div class="ready-content">
            <p class="ready-title">Your order is ready!</p>
            <p class="ready-subtitle">Please collect it from the vendor location</p>
          </div>
        </div>
      </section>

      <!-- Timeline Card -->
      <section class="timeline-card">
        <h2 class="card-title">Activity Timeline</h2>
        <ol class="timeline" id="timeline"></ol>
      </section>

      <!-- Estimated Time Card -->
      <section class="estimate-card">
        <div class="estimate-content">
          <div class="estimate-text">
            <p id="time-estimate" class="estimate-value">Calculating...</p>
          </div>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="order-detail.js"></script>
  </body>
</html>
