<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard – CampusBite</title>
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>

<nav class="topnav">
  <strong class="nav-logo">Campus<span>Bite</span> <small>Admin</small></strong>
  <section class="nav-right">
    <span class="admin-badge">Admin Panel</span>
    <button class="btn-logout" id="logoutBtn">Logout</button>
  </section>
</nav>

<main class="container">

  <header class="page-header">
    <h1>Vendor <span>Management</span></h1>
    <p>Approve or suspend vendor accounts on the platform.</p>
  </header>

  <!-- Stats row -->
  <section class="stats-row" aria-label="Vendor statistics">
    <article class="stat-card">
      <p class="stat-number" id="statTotal">—</p>
      <p class="stat-label">Total Vendors</p>
    </article>
    <article class="stat-card">
      <p class="stat-number green" id="statApproved">—</p>
      <p class="stat-label">Approved</p>
    </article>
    <article class="stat-card">
      <p class="stat-number orange" id="statPending">—</p>
      <p class="stat-label">Pending</p>
    </article>
    <article class="stat-card">
      <p class="stat-number red" id="statSuspended">—</p>
      <p class="stat-label">Suspended</p>
    </article>
  </section>

  <!-- Filter tabs -->
  <nav class="filter-tabs" aria-label="Filter vendors">
    <button class="tab-btn active" data-filter="all">All</button>
    <button class="tab-btn" data-filter="pending">Pending</button>
    <button class="tab-btn" data-filter="approved">Approved</button>
    <button class="tab-btn" data-filter="suspended">Suspended</button>
  </nav>


  <section class="vendor-list" id="vendorList" aria-live="polite">
    <p class="empty-state">Loading vendors...</p>
  </section>

</main>


<output class="toast" id="toast" aria-live="assertive"></output>

<script type="module" src="./admin.js"></script>

</body>
</html>
