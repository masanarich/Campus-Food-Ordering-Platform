<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track your order</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="card">
    <header class="card-header">
      <section class="order-info">
        <h1 id="order-title">Loading...</h1>
        <p id="order-sub"></p>
      </section>
      <span id="status-tag" class="tag"></span>
    </header>

    <section class="steps" id="steps">
      <article class="step" id="s0">
        <span class="dot" id="d0"></span>
        <label class="step-label">Order received</label>
      </article>
      <article class="step" id="s1">
        <span class="dot" id="d1"></span>
        <label class="step-label">Preparing</label>
      </article>
      <article class="step" id="s2">
        <span class="dot" id="d2"></span>
        <label class="step-label">Ready for pickup</label>
      </article>
    </section>

    <aside id="ready-banner" class="banner hidden">
      Your order is ready — please collect from the canteen counter.
    </aside>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
