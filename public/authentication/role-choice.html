<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Select Portal | Beauty on Cloud</title>
  <link rel="stylesheet" href="./style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
</head>

<body class="auth-body">
  <header class="auth-header">
    <a href="../index.html" class="auth-brand">
      <span class="brand-mark">B</span>
      <span class="brand-text">
        Beauty <span class="brand-highlight">on Cloud</span>
      </span>
    </a>

    <nav class="auth-top-links">
      <a href="../index.html">Back to home</a>
      <a id="logout-link" href="./login.html">Log out</a>
    </nav>
  </header>

  <main class="auth-main">
    <section class="auth-card">
      <header class="auth-card-header">
        <h1>Choose your portal</h1>
        <p>Select how you want to use the Beauty on Cloud platform.</p>
      </header>

      <div id="role-error" class="auth-error" hidden></div>

      <!-- Buttons injected by JS depending on roles -->
      <div id="portal-buttons" class="portal-list"></div>

      <div class="auth-legal-links">
        <a href="../legal/privacy.html" target="_blank">Privacy</a>
        <span>·</span>
        <a href="../legal/terms.html" target="_blank">Terms</a>
        <span>·</span>
        <a href="../legal/cookies.html" target="_blank">Cookies</a>
      </div>
    </section>
  </main>

  <script type="module" src="./role-choice.js"></script>
</body>

</html>
