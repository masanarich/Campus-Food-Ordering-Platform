<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Register | Campus Food Ordering Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <header>
    <h1>Campus Food Ordering Platform</h1>
    <nav>
      <a href="../index.html">Home</a>
      <a href="./login.html">Login</a>
    </nav>
  </header>

  <main>

    <section>
      <h2>Create Account</h2>
      <p>Register to order food from campus vendors.</p>

      <form id="register-form">

        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
        <p data-error-for="fullName"></p>


        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <p data-error-for="email"></p>


        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required>
        <p data-error-for="password"></p>


        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
        <p data-error-for="confirmPassword"></p>


        <label for="accountType">Register As</label>
        <select id="accountType" name="accountType">
          <option value="customer">Customer</option>
          <option value="vendor">Vendor</option>
        </select>
        <p data-error-for="accountType"></p>


        <button type="submit">Create Account</button>

      </form>

      <p id="register-status"></p>

    </section>


    <section>
      <h3>Or sign up with</h3>

      <button id="google-signin">Continue with Google</button>
      <button id="apple-signin">Continue with Apple</button>

    </section>


    <section>
      <p>
        Already have an account?
        <a href="./login.html">Login here</a>
      </p>
    </section>

  </main>


  <footer>
    <p>Campus Food Ordering Platform © 2026</p>
  </footer>


  <script type="module">

    import { authService } from "./auth.js";
    import * as authUtils from "./auth-utils.js";
    import { initializeRegisterPage } from "./register.js";

    initializeRegisterPage({
      authService,
      authUtils
    });

  </script>

</body>

</html>
