<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset password | Beauty on Cloud</title>

  <link rel="stylesheet" href="./style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
</head>

<body class="auth-body">
  <header class="auth-header">
    <a href="../index.html" class="auth-brand">
      <span class="brand-mark">B</span>
      <span class="brand-text">
        Beauty <span class="brand-highlight">on Cloud</span>
      </span>
    </a>

    <nav class="auth-top-links">
      <a href="../index.html">Back to home</a>
      <a href="./login.html">Back to login</a>
    </nav>
  </header>

  <main class="auth-main">
    <section class="auth-card">
      <header class="auth-card-header">
        <h1>Forgot your password?</h1>
        <p>
          Enter your email address and we’ll send you a password reset link
          for your Beauty on Cloud account.
        </p>
      </header>

      <div id="reset-message" class="auth-success" hidden></div>
      <div id="reset-error" class="auth-error" hidden></div>

      <form id="reset-form" class="auth-form">
        <div class="auth-row">
          <label for="email">Email address</label>
          <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@example.com" />
        </div>

        <button type="submit" class="btn btn-primary auth-submit">
          Send reset link
        </button>
      </form>

      <div class="auth-footer-links">
        <a href="./login.html">Remembered your password? Log in</a>
        <span>·</span>
        <a href="./register.html">Need an account? Sign up</a>
      </div>

      <div class="auth-legal-links">
        <a href="../legal/privacy.html" target="_blank">Privacy</a>
        <span>·</span>
        <a href="../legal/terms.html" target="_blank">Terms</a>
        <span>·</span>
        <a href="../legal/cookies.html" target="_blank">Cookies</a>
      </div>
    </section>
  </main>

  <script type="module" src="./reset.js"></script>
</body>

</html>
